name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the [Roadmap](../../README.md#roadmap)
        and existing issues to avoid duplicates.

  - type: input
    id: package
    attributes:
      label: Package
      description: Which package does this affect? Use "new" for a new package proposal.
      placeholder: retryx, circuitx, new, etc.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you'd like. Code examples are welcome.
      render: go
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked the roadmap and existing issues
          required: true
        - label: This follows URX design principles (single responsibility, generic-first, structured errors)
          required: true
