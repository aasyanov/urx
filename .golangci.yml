run:
  go: "1.24"
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - typecheck
    - gosimple
    - gocritic
    - revive
    - misspell
    - prealloc
    - unconvert
    - unparam
    - forbidigo
    - goconst

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  forbidigo:
    forbid:
      - p: ^fmt\.Errorf$
        msg: "use errx.New / errx.Wrap instead of fmt.Errorf"
      - p: ^errors\.New$
        msg: "use errx.New instead of errors.New"
  goconst:
    min-len: 3
    min-occurrences: 3

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - linters:
        - forbidigo
      path: _test\.go$
    - linters:
        - forbidigo
      path: examples/
    - linters:
        - goconst
      path: _test\.go$
  max-issues-per-linter: 0
  max-same-issues: 0
