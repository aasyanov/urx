version: "2"

run:
  go: "1.24"
  timeout: 5m
  relative-path-mode: cfg

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - typecheck
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - forbidigo
    - goconst
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    forbidigo:
      forbid:
        - pattern: '^fmt\.Errorf$'
          msg: "use errx.New / errx.Wrap instead of fmt.Errorf"
        - pattern: '^errors\.New$'
          msg: "use errx.New instead of errors.New"
    goconst:
      min-len: 3
      min-occurrences: 3
  exclusions:
    presets:
      - std-error-handling
    paths:
      - vendor
    rules:
      - linters:
          - forbidigo
        path: '_test\.go$'
      - linters:
          - forbidigo
        path: 'examples/'
      - linters:
          - goconst
        path: '_test\.go$'
    max-issues-per-linter: 0
    max-same-issues: 0
