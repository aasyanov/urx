version: "2"

run:
  go: "1.24"
  timeout: 5m
  relative-path-mode: cfg

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - goconst
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    goconst:
      min-len: 3
      min-occurrences: 3
  exclusions:
    presets:
      - std-error-handling
    paths:
      - vendor
    rules:
      - linters:
          - errcheck
          - unparam
        path: '_test\.go$'
      - linters:
          - goconst
        path: '_test\.go$'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
